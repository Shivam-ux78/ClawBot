<!DOCTYPE html>
<html>
<head>
  <title>ClawBot Sync</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 320px;
      padding: 16px;
      margin: 0;
      background-color: #f8f9fa;
      color: #333;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
      color: #2c3e50;
      border-bottom: 2px solid #e9ecef;
      padding-bottom: 8px;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: 600;
      font-size: 12px;
      color: #495057;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      border: 1px solid #ced4da;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }
    .help-text {
      font-size: 11px;
      color: #6c757d;
      margin-top: 2px;
      margin-bottom: 8px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #0056b3;
    }
    #status {
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
      font-weight: 500;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }
    .success { background-color: #d4edda; color: #155724; }
    .error { background-color: #f8d7da; color: #721c24; }
    .info { background-color: #e2e3e5; color: #383d41; }
  </style>
</head>
<body>
  <h2>ClawBot Sync Configuration</h2>
  
  <label for="serverUrl">Cloud API URL</label>
  <input type="url" id="serverUrl" placeholder="https://your-server.com/api/cookies/update">
  
  <label for="secretKey">Secret Key</label>
  <input type="password" id="secretKey" placeholder="Enter EXTENSION_SECRET_KEY">
  
  <label for="accountId">Target Instagram Account ID</label>
  <input type="text" id="accountId" placeholder="e.g. 34978143342">
  <div class="help-text">Only syncs when this ID is logged in.</div>
  
  <button id="saveBtn">Save & Sync Now</button>
  
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
