services:
  # 1. Main Express Server & Dashboard (Web Service)
  - type: web
    name: clawbot-server
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    region: singapore
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: INSTAGRAM_STUB_MODE
        value: "false"
      - key: AUTO_DM_MODE
        value: "false"
      - key: DASHBOARD_USER
        value: "admin"
      - key: DASHBOARD_PASSWORD
        sync: false

  # 2. BullMQ Outbound DM Worker (Background Worker)
  - type: worker
    name: clawbot-worker
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    region: singapore
    plan: starter
    dockerCommand: "node src/queues/worker.js"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: INSTAGRAM_STUB_MODE
        value: "false"
